name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-guard:
    name: Test Layer Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }
      - run: python scripts/test_layer_guard.py

  test-fast:
    name: Fast Tests (<1s)
    runs-on: ubuntu-latest
    needs: test-guard
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r gateway/requirements.txt
          pip install pytest-subtests Pillow opencv-python-headless numpy
      - name: Run fast tests
        run: pytest tests/ -v -m fast --tb=short -p no:schemathesis

  test-medium:
    name: Medium Tests (<5s)
    runs-on: ubuntu-latest
    needs: test-fast
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r gateway/requirements.txt
          pip install pytest-subtests Pillow opencv-python-headless numpy
      - name: Run medium tests
        run: pytest tests/ -v -m "medium and not slow" --tb=short -p no:schemathesis

  test-coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test-medium
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r gateway/requirements.txt
          pip install pytest-cov pytest-subtests Pillow opencv-python-headless numpy
      - name: Run tests with coverage
        run: |
          pytest tests/ -v -m "not llm and not slow" --tb=short \
            --cov=gateway --cov=schema --cov=analyzers --cov=drivers --cov=adapters/python \
            --cov-report=xml --cov-report=term-missing \
            -p no:schemathesis
      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          file: ./coverage.xml

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }
      - name: Install linter
        run: pip install ruff
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Test layer guard
        run: python scripts/test_layer_guard.py --staged
